version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: memo_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memo_db}
      POSTGRES_USER: ${POSTGRES_USER:-memo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memo_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memo_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memo_network

  redis:
    image: redis:7-alpine
    container_name: memo_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memo_network

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: memo_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    networks:
      - memo_network

  minio:
    image: minio/minio:latest
    container_name: memo_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - memo_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: memo_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - memo_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: memo_worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - memo_network
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q analysis,default

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: memo_flower
    env_file:
      - .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    networks:
      - memo_network
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=${CELERY_BROKER_URL:-redis://redis:6379/1}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: memo_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - memo_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  memo_network:
    driver: bridge
